app = "guigoes-live"
primary_region = "gru"

[build]
dockerfile = "Dockerfile"

[processes]
app = "/app/server -port 8090"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8090
min_machines_running = 0
processes = [ "app" ]

[[http_service.checks]]
grace_period = "15s"
interval = "30s"
method = "GET"
path = "/components/button"
protocol = "http"
timeout = "5s"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
